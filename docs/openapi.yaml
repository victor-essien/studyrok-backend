openapi: 3.0.3

info:
  title: StudyRok Backend API
  description: AI-powered study materials generation platform - TypeScript/Express REST API for generating notes, flashcards, quizzes, and study boards
  version: 1.0.0
  contact:
    name: StudyRok Support
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: Development server
  - url: http://localhost:3000/api
    description: API base path

security:
  - bearerAuth: []

tags:
  - name: Authentication
    description: User authentication and authorization (signup, login, password reset, onboarding)
  - name: Users
    description: User profile management operations
  - name: StudyBoards
    description: Study board creation and management
  - name: Materials
    description: Material upload, generation, and management
  - name: Notes
    description: AI-powered note generation and management
  - name: Flashcards
    description: Flashcard set generation and spaced repetition
  - name: Quizzes
    description: Quiz generation and assessment management



paths:
  # ==================== AUTHENTICATION ENDPOINTS ====================
  
  /auth/signup:
    post:
      tags:
        - Authentication
      summary: Create a new user account
      description: Create a new user account with email and password
      operationId: signup
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  statusCode:
                    type: integer
                    example: 201
                  data:
                    $ref: '#/components/schemas/AuthResponse'
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: User Login
      description: Authenticate user with email and password, returns access and refresh tokens
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginPayload'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  statusCode:
                    type: integer
                    example: 200
                  data:
                    $ref: '#/components/schemas/LoginResponse'
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/forgot-password:
    post:
      tags:
        - Authentication
      summary: Request Password Reset
      description: Send password reset code to user's email
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Password reset code sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/reset-password:
    post:
      tags:
        - Authentication
      summary: Reset Password with Token
      description: Complete password reset using email, token, and new password
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - token
                - newPassword
                - confirmPassword
              properties:
                email:
                  type: string
                  format: email
                token:
                  type: string
                newPassword:
                  type: string
                  format: password
                confirmPassword:
                  type: string
                  format: password
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh Access Token
      description: Get a new access token using a valid refresh token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/LoginResponse'
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get Current User Profile
      description: Retrieve the authenticated user's profile information
      operationId: getCurrentUser
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/UserProfile'
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/verify:
    get:
      tags:
        - Authentication
      summary: Verify Authentication Status
      description: Check if the current JWT token is valid
      operationId: verifyAuth
      responses:
        '200':
          description: Authentication verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      valid:
                        type: boolean
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/onboarding:
    post:
      tags:
        - Authentication
      summary: Complete User Onboarding
      description: Complete the onboarding process for a new user
      operationId: onboarding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                preferences:
                  type: object
                  description: User preferences (JSON object)
      responses:
        '200':
          description: Onboarding completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/UserProfile'
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/profile:
    patch:
      tags:
        - Authentication
      summary: Update User Profile
      description: Update authenticated user's profile information
      operationId: updateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                preferences:
                  type: object
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/UserProfile'
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/change-password:
    post:
      tags:
        - Authentication
      summary: Change Password
      description: Change password for authenticated user
      operationId: changePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
                - confirmPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
                confirmPassword:
                  type: string
                  format: password
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout User
      description: Invalidate current session and logout user
      operationId: logout
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ==================== USER ENDPOINTS ====================

  /users/{id}:
    get:
      tags:
        - Users
      summary: Get User Profile by ID
      description: Retrieve a user's complete profile information
      operationId: getUserById
      parameters:
        - name: id
          in: path
          required: true
          description: User ID (UUID)
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/UserProfile'
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - Users
      summary: Update User Profile (Full Update)
      description: Update all fields of a user profile
      operationId: updateUser
      parameters:
        - name: id
          in: path
          required: true
          description: User ID (UUID)
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: User profile updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/UserProfile'
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      tags:
        - Users
      summary: Partially Update User Profile
      description: Update specific fields of a user profile
      operationId: patchUser
      parameters:
        - name: id
          in: path
          required: true
          description: User ID (UUID)
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                preferences:
                  type: object
      responses:
        '200':
          description: User profile updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/UserProfile'
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Users
      summary: Delete User Account
      description: Permanently delete a user account
      operationId: deleteUser
      parameters:
        - name: id
          in: path
          required: true
          description: User ID (UUID)
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /users:
    post:
      tags:
        - Users
      summary: Create a new user
      description: Register a new user account
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses: 
        '201': 
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserProfile'
                  status:
                    type: string
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '500': 
          $ref: '#/components/responses/InternalServerError'
  # Authentication
  /auth/signup:
    post:
      tags: 
        - Authentication
      summary: Register a new account   
      description: Create a new user account with email and password
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuthResponse'
                  status:
                    type: string
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '500': 
          $ref: '#/components/responses/InternalServerError'
  
  /auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate user and return JWT token
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginPayload'
      responses:
        '200':
          description: Login successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LoginResponse'
                  status:
                    type: string
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500': 
          $ref: '#/components/responses/InternalServerError'
  
  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Get a new access token using a valid refresh token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LoginResponse'
                  status:
                    type: string
                  message:
                    type: string
          '401':
            $ref: '#/components/responses/Unauthorized'
        '500': 
          $ref: '#/components/responses/InternalServerError'

    
    /auth/onboarding:
      post:
        tags:
          - Authentication
        summary: Onboard new account
        description: Onboard a new account
        operationId: onboarding
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingRequest'
        responses:
          '200':
            description: Onboarding successful
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/UserProfile'
                    status:
                      type: string
                    message:
                      type: string
          '400':
            $ref: '#/components/responses/ValidationError'
          '500':
            $ref: '#/components/responses/InternalServerError'
    
    
    /auth/logout:
      post:
        tags:
          - Authentication
        summary: Logout
        description: Invalidate current session
        operationId: logout
        responses:
          '200':
            description: Logout successful
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    data:
                      type: boolean
                    status:
                      type: string
                    message:
                      type: string
          '401':
            $ref: '#/components/responses/Unauthorized'
          '500': 
            $ref: '#/components/responses/InternalServerError'
  
  # Password Management
  /password/forgot:
    post:
      tags:
        - Password
      summary: Initialize password reset
      description: Request a password reset code
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
        application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Password reset initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                    data:
                      type: boolean
                    status:
                      type: string
                    message:
                      type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '500': 
          $ref: '#/components/responses/InternalServerError'

  /password/resend-code:
    post:
      tags:
        - Password
      summary: Resend password reset code
      description: Resend the password reset code to the user's email
      operationId: resendCode
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Password reset code resent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: boolean
                  status:
                    type: string
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '500': 
          $ref: '#/components/responses/InternalServerError' 

  /password/reset:
    post:
      tags:
        - Password
      summary: Finalize password reset
      description: Complete password reset with code and new password
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: boolean
                  status:
                    type: string
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '500': 
          $ref: '#/components/responses/InternalServerError'
  
  
  # Studyboard operations  
  /studyboards:
    post:
      tags:
        - CreateStudyBoard
      summary: Create studyboard
      description: Create a new studyboard
      operationId: CreateStudyBoard
      requestBody:
        required: true
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/StudyBoard'
      responses:
        '201':
          description: Studyboard created successfully
          content: 
            application/json:
              schema:
                type: object  
                properties:
                  data:
                    $ref: '#/components/schemas/Studyboard'
                  status:
                    type: string
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
    tags:
      - StudyBoard
    summary: Get all studyboards for the authenticated user
    description: Retrieve studyboards filtered by catergory and search
    parameters:
      - name: catergory
        in: query
        required: true
        description: Studyboard category filtered
        schema: 
          $ref: '#/components/schemas/StudyboardCategory'
      - name: query
        in: query
        required: false
        description: Search query
        schema:
          type: string
    responses:
      '200':
        description: Studyboard fetched successfully
        content: 
          application/json:
            schema:
              type: object
              properties: 
                data:
                  type: array
                  items:
                    $ref: '#/components/schema/StudyboardOption'
                status:
                  type: string
                message:
                  type: string
                pagination:
                  $ref: '#/components/schema/PaginatedData'
      '400':
        $ref: '#/components/responses/ValidationError'
      '401':
        $ref: '#/components/responses/Unauthorized'
      '500':
        $ref: '#/components/responses/InternalServerError'          

  /studyboards/{studyboardId}:
    get:
      tags:
        - StudyBoard
      summary: Get studyboard by ID
      description: Retrieve and view a studyboard with all information present 
      operationId: getStudyBoardById
      parameters:
        - name: id
          in: path  
          required: true
          description: Studyboard ID
          schema:
            type: string
      responses:
        '200':
          description: Studyboard retrieved successfully
          content: 
            application/json:
              schema:
                type: object
                properties: 
                  data:
                    $ref: '#/components/schemas/StudyBoard'
                  status:
                    type: string
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/SimpleError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      tags:
        - StudyBoard
      summary: Partially update studyboard
      description: Update specific fields of a studyboard
      operationId: patchStudyBoard
      parameters:
        - name: id
          in: path
          required: true
          description: Studyboard ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfile'
      responses:
        '200':
          description: Studyboard updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/StudyBoard'
                  status:
                    type: string
                  message:
                  type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - StudyBoard
      summary: Delete Studyboard
      description: Permanently delete studyboard
      operationId: deleteStudyBoard
      parameters:
        - name: id
          in: path
          required: true
          description: StudyBoard ID
          schema:
            type: string
      responses:
        '200':
          description: Studyboard deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: 
                    type: boolean
                  status:
                    type: string
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'             

  /studyboards/recent:
    get:
      tags:
        - StudyBoard
      summary: Get recently accessed studyboards
      description: Retrieve a list of recently accessed studyboards for the authenticated user
      operationId: getRecentStudyBoards
      responses:
        '200':
          description: Recent studyboards retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StudyboardOption'
                  status:
                    type: string
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /studyboards/{studyboardId}/archive:
    patch:
      tags:
        - StudyBoard
      summary: Archive and unarchive a studyboard
      description: Toggle studyboard to the archived or unarchived state
      operationId: archiveStudyBoard
      parameters:
        - name: studyboardId
          in: path
          required: true
